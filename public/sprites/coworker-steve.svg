<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Steve from Facilities: mustache, cap, work shirt with name tag -->
  <!-- Cap -->
  <rect x="9" y="1" width="14" height="3" fill="#2255AA"/>
  <rect x="7" y="3" width="18" height="2" fill="#1A4488"/>
  <rect x="10" y="2" width="6" height="1" fill="#FFFFFF"/>
  <!-- Head -->
  <rect x="11" y="5" width="10" height="8" fill="#C68642"/>
  <rect x="10" y="6" width="1" height="6" fill="#C68642"/>
  <rect x="21" y="6" width="1" height="6" fill="#A86E32"/>
  <!-- Eyes -->
  <rect x="13" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="14" y="8" width="1" height="1" fill="#3B2F2F"/>
  <rect x="17" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="18" y="8" width="1" height="1" fill="#3B2F2F"/>
  <!-- Thick mustache -->
  <rect x="12" y="10" width="8" height="1" fill="#3B2F2F"/>
  <rect x="13" y="11" width="6" height="1" fill="#3B2F2F"/>
  <!-- Mouth (hidden behind mustache, just lower lip) -->
  <rect x="14" y="12" width="4" height="1" fill="#A05040"/>
  <!-- Neck -->
  <rect x="14" y="13" width="4" height="2" fill="#C68642"/>
  <!-- Work shirt (khaki/tan) -->
  <rect x="8" y="15" width="7" height="12" fill="#C2A878"/>
  <rect x="17" y="15" width="7" height="12" fill="#AA9060"/>
  <!-- Shoulders -->
  <rect x="6" y="16" width="2" height="10" fill="#C2A878"/>
  <rect x="24" y="16" width="2" height="10" fill="#AA9060"/>
  <!-- Collar -->
  <rect x="13" y="15" width="2" height="2" fill="#D4BC90"/>
  <rect x="17" y="15" width="2" height="2" fill="#D4BC90"/>
  <!-- Name tag -->
  <rect x="9" y="18" width="5" height="3" fill="#FFFFFF"/>
  <rect x="9" y="18" width="5" height="1" fill="#CC0000"/>
  <rect x="10" y="19" width="3" height="1" fill="#333333"/>
  <!-- Buttons -->
  <rect x="16" y="17" width="1" height="1" fill="#8B7748"/>
  <rect x="16" y="20" width="1" height="1" fill="#8B7748"/>
  <rect x="16" y="23" width="1" height="1" fill="#8B7748"/>
  <!-- Bottom -->
  <rect x="6" y="26" width="20" height="6" fill="#C2A878"/>
</svg>
