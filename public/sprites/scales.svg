<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Left pan -->
  <rect x="0" y="5" width="5" height="3" fill="#C0C0C0"/>
  <rect x="0" y="5" width="5" height="1" fill="#DFDFDF"/>
  <rect x="0" y="7" width="5" height="1" fill="#808080"/>
  <!-- Right pan -->
  <rect x="11" y="8" width="5" height="3" fill="#C0C0C0"/>
  <rect x="11" y="8" width="5" height="1" fill="#DFDFDF"/>
  <rect x="11" y="10" width="5" height="1" fill="#808080"/>
  <!-- Chains -->
  <rect x="2" y="3" width="1" height="2" fill="#808080"/>
  <rect x="13" y="3" width="1" height="5" fill="#808080"/>
  <!-- Beam -->
  <rect x="2" y="2" width="12" height="1" fill="#808080"/>
  <!-- Fulcrum -->
  <rect x="7" y="1" width="2" height="1" fill="#808080"/>
  <rect x="7" y="3" width="2" height="2" fill="#808080"/>
  <rect x="6" y="5" width="4" height="1" fill="#808080"/>
  <!-- Base -->
  <rect x="5" y="13" width="6" height="1" fill="#808080"/>
  <rect x="7" y="6" width="2" height="7" fill="#808080"/>
</svg>
