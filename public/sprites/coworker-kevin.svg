<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Kevin from IT: messy hair, band t-shirt, headphones around neck -->
  <!-- Messy hair -->
  <rect x="10" y="1" width="12" height="2" fill="#CC6600"/>
  <rect x="9" y="2" width="2" height="2" fill="#CC6600"/>
  <rect x="21" y="2" width="2" height="2" fill="#CC6600"/>
  <rect x="11" y="3" width="10" height="2" fill="#CC6600"/>
  <rect x="22" y="1" width="1" height="2" fill="#CC6600"/>
  <rect x="9" y="1" width="1" height="1" fill="#CC6600"/>
  <!-- Head -->
  <rect x="11" y="5" width="10" height="8" fill="#FFE0BD"/>
  <rect x="10" y="6" width="1" height="6" fill="#FFE0BD"/>
  <rect x="21" y="6" width="1" height="6" fill="#E8C8A0"/>
  <!-- Eyes -->
  <rect x="13" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="14" y="8" width="1" height="1" fill="#4488CC"/>
  <rect x="17" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="18" y="8" width="1" height="1" fill="#4488CC"/>
  <!-- Stubble -->
  <rect x="12" y="11" width="1" height="1" fill="#DDCCAA"/>
  <rect x="14" y="12" width="1" height="1" fill="#DDCCAA"/>
  <rect x="17" y="12" width="1" height="1" fill="#DDCCAA"/>
  <rect x="19" y="11" width="1" height="1" fill="#DDCCAA"/>
  <!-- Mouth (smirk) -->
  <rect x="14" y="11" width="3" height="1" fill="#C07060"/>
  <rect x="17" y="10" width="1" height="1" fill="#C07060"/>
  <!-- Neck -->
  <rect x="14" y="13" width="4" height="2" fill="#FFE0BD"/>
  <!-- Headphones around neck -->
  <rect x="11" y="14" width="2" height="1" fill="#333333"/>
  <rect x="19" y="14" width="2" height="1" fill="#333333"/>
  <rect x="12" y="15" width="1" height="1" fill="#333333"/>
  <rect x="19" y="15" width="1" height="1" fill="#333333"/>
  <!-- Band t-shirt (dark with graphic) -->
  <rect x="8" y="15" width="16" height="12" fill="#222222"/>
  <!-- Shoulders -->
  <rect x="6" y="16" width="2" height="10" fill="#222222"/>
  <rect x="24" y="16" width="2" height="10" fill="#1A1A1A"/>
  <!-- T-shirt graphic (skull-ish) -->
  <rect x="14" y="18" width="4" height="3" fill="#888888"/>
  <rect x="14" y="18" width="1" height="1" fill="#CCCCCC"/>
  <rect x="17" y="18" width="1" height="1" fill="#CCCCCC"/>
  <rect x="15" y="20" width="2" height="1" fill="#CCCCCC"/>
  <!-- Bottom -->
  <rect x="6" y="26" width="20" height="6" fill="#222222"/>
</svg>
