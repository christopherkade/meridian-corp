<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- "Gary from... HR?" — alien poorly disguised as a human office worker -->
  <!-- Hair (wig, slightly crooked, jet black, too uniform) -->
  <rect x="10" y="2" width="12" height="3" fill="#111111"/>
  <rect x="9" y="3" width="1" height="2" fill="#111111"/>
  <rect x="22" y="3" width="1" height="2" fill="#111111"/>
  <!-- Wig edge visible on one side (askew) -->
  <rect x="9" y="5" width="1" height="1" fill="#111111"/>
  <!-- Head (slightly greenish skin tone) -->
  <rect x="11" y="5" width="10" height="8" fill="#D4D8A0"/>
  <rect x="10" y="6" width="1" height="6" fill="#D4D8A0"/>
  <rect x="21" y="6" width="1" height="6" fill="#BCC088"/>
  <!-- Eyes (just slightly too big, too round) -->
  <rect x="12" y="7" width="3" height="3" fill="#FFFFFF"/>
  <rect x="13" y="8" width="2" height="2" fill="#222222"/>
  <rect x="17" y="7" width="3" height="3" fill="#FFFFFF"/>
  <rect x="18" y="8" width="2" height="2" fill="#222222"/>
  <!-- Forced smile (too wide, slightly unsettling) -->
  <rect x="12" y="11" width="8" height="1" fill="#CC6666"/>
  <rect x="13" y="12" width="6" height="1" fill="#FFFFFF"/>
  <!-- Neck -->
  <rect x="14" y="13" width="4" height="2" fill="#D4D8A0"/>
  <!-- Collar (slightly too high, hiding something) -->
  <rect x="12" y="15" width="3" height="3" fill="#FFFFFF"/>
  <rect x="17" y="15" width="3" height="3" fill="#F0F0F0"/>
  <!-- Tie (perfectly centered, too perfect) -->
  <rect x="15" y="15" width="2" height="1" fill="#0000CC"/>
  <rect x="15" y="16" width="2" height="1" fill="#0000CC"/>
  <rect x="15" y="17" width="2" height="5" fill="#0000CC"/>
  <rect x="15" y="22" width="2" height="1" fill="#000099"/>
  <!-- Shirt (plain white, overly pristine) -->
  <rect x="8" y="18" width="7" height="9" fill="#F8F8F8"/>
  <rect x="17" y="18" width="7" height="9" fill="#E8E8E8"/>
  <!-- Shoulders -->
  <rect x="6" y="19" width="2" height="7" fill="#F8F8F8"/>
  <rect x="24" y="19" width="2" height="7" fill="#E8E8E8"/>
  <!-- Name badge (upside down) -->
  <rect x="9" y="20" width="4" height="3" fill="#FFFFFF"/>
  <rect x="9" y="22" width="4" height="1" fill="#CC0000"/>
  <rect x="10" y="20" width="2" height="1" fill="#333333"/>
  <!-- Bottom -->
  <rect x="6" y="26" width="20" height="6" fill="#F8F8F8"/>
</svg>
