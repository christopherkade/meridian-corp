<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Can body -->
  <rect x="4" y="4" width="8" height="10" fill="#C0C0C0"/>
  <rect x="4" y="4" width="8" height="1" fill="#DFDFDF"/>
  <rect x="4" y="4" width="1" height="10" fill="#DFDFDF"/>
  <rect x="11" y="4" width="1" height="10" fill="#808080"/>
  <rect x="4" y="13" width="8" height="1" fill="#808080"/>
  <!-- Lid / opening -->
  <rect x="3" y="3" width="10" height="1" fill="#808080"/>
  <rect x="5" y="2" width="6" height="1" fill="#808080"/>
  <!-- Stripes on can -->
  <rect x="5" y="6" width="6" height="1" fill="#808080"/>
  <rect x="5" y="10" width="6" height="1" fill="#808080"/>
  <!-- Trash peeking -->
  <rect x="5" y="0" width="2" height="3" fill="#DFDFDF"/>
  <rect x="9" y="1" width="2" height="2" fill="#DFDFDF"/>
</svg>
