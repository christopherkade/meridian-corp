<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Outer loop top -->
  <rect x="7" y="0" width="4" height="1" fill="#C0C0C0"/>
  <rect x="6" y="1" width="1" height="1" fill="#C0C0C0"/>
  <rect x="11" y="1" width="1" height="1" fill="#808080"/>
  <!-- Outer loop sides -->
  <rect x="5" y="2" width="1" height="10" fill="#C0C0C0"/>
  <rect x="12" y="2" width="1" height="4" fill="#808080"/>
  <!-- Outer loop bottom -->
  <rect x="6" y="12" width="1" height="1" fill="#C0C0C0"/>
  <rect x="7" y="13" width="3" height="1" fill="#808080"/>
  <rect x="6" y="14" width="0" height="0" fill="none"/>
  <!-- Inner turn top -->
  <rect x="8" y="5" width="3" height="1" fill="#808080"/>
  <rect x="11" y="6" width="1" height="1" fill="#808080"/>
  <!-- Inner loop side -->
  <rect x="7" y="6" width="1" height="6" fill="#C0C0C0"/>
  <!-- Inner loop bottom -->
  <rect x="8" y="12" width="2" height="1" fill="#808080"/>
  <rect x="10" y="13" width="1" height="1" fill="#808080"/>
  <!-- Bottom curve of outer -->
  <rect x="10" y="14" width="1" height="1" fill="#808080"/>
  <rect x="9" y="15" width="2" height="1" fill="#808080"/>
</svg>
