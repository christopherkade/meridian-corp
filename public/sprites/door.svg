  <rect x="5" y="2" width="8" height="1" fill="#C49A6C"/>
  <rect x="5" y="2" width="1" height="12" fill="#C49A6C"/>
  <rect x="12" y="2" width="1" height="12" fill="#5A4000"/>
  <rect x="5" y="13" width="8" height="1" fill="#5A4000"/>
