<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Pam from Compliance: grey bob haircut, pearl necklace, olive cardigan -->
  <!-- Hair (neat bob) -->
  <rect x="10" y="2" width="12" height="3" fill="#A0A0A0"/>
  <rect x="9" y="3" width="1" height="8" fill="#A0A0A0"/>
  <rect x="22" y="3" width="1" height="8" fill="#909090"/>
  <rect x="8" y="6" width="1" height="6" fill="#A0A0A0"/>
  <rect x="23" y="6" width="1" height="6" fill="#909090"/>
  <!-- Head -->
  <rect x="11" y="5" width="10" height="8" fill="#E8C4A0"/>
  <rect x="10" y="6" width="1" height="6" fill="#E8C4A0"/>
  <rect x="21" y="6" width="1" height="6" fill="#D0A880"/>
  <!-- Eyes -->
  <rect x="13" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="14" y="8" width="1" height="1" fill="#556B2F"/>
  <rect x="17" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="18" y="8" width="1" height="1" fill="#556B2F"/>
  <!-- Eyebrows -->
  <rect x="13" y="6" width="2" height="1" fill="#888888"/>
  <rect x="17" y="6" width="2" height="1" fill="#888888"/>
  <!-- Small smile -->
  <rect x="14" y="11" width="4" height="1" fill="#B07060"/>
  <!-- Neck -->
  <rect x="14" y="13" width="4" height="2" fill="#E8C4A0"/>
  <!-- Pearl necklace -->
  <rect x="12" y="15" width="1" height="1" fill="#FFFDD0"/>
  <rect x="14" y="15" width="1" height="1" fill="#FFFDD0"/>
  <rect x="16" y="15" width="1" height="1" fill="#FFFDD0"/>
  <rect x="18" y="15" width="1" height="1" fill="#FFFDD0"/>
  <!-- Cardigan (olive green) -->
  <rect x="8" y="16" width="4" height="11" fill="#6B7B3A"/>
  <rect x="20" y="16" width="4" height="11" fill="#5A6A2E"/>
  <!-- Shoulders -->
  <rect x="6" y="17" width="2" height="9" fill="#6B7B3A"/>
  <rect x="24" y="17" width="2" height="9" fill="#5A6A2E"/>
  <!-- Blouse underneath (cream) -->
  <rect x="12" y="16" width="8" height="11" fill="#FFF8E7"/>
  <!-- Cardigan edges -->
  <rect x="12" y="16" width="1" height="11" fill="#6B7B3A"/>
  <rect x="19" y="16" width="1" height="11" fill="#5A6A2E"/>
  <!-- Brooch on cardigan -->
  <rect x="12" y="18" width="1" height="1" fill="#FFD700"/>
  <!-- Blouse buttons -->
  <rect x="16" y="18" width="1" height="1" fill="#DDD8C8"/>
  <rect x="16" y="21" width="1" height="1" fill="#DDD8C8"/>
  <rect x="16" y="24" width="1" height="1" fill="#DDD8C8"/>
  <!-- Bottom -->
  <rect x="6" y="26" width="20" height="6" fill="#6B7B3A"/>
</svg>
